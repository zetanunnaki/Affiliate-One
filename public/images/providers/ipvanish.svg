<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="IPVanish">
  <title>IPVanish</title>
  <desc>IPVanish logo representation for BuySecureVPN review. Brand colors: #6AB04C.</desc>
  <defs>
    <linearGradient id="ipvGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ec858"/>
      <stop offset="100%" stop-color="#6AB04C"/>
    </linearGradient>
  </defs>
  <!-- Brand mark: rounded square with shield icon -->
  <rect x="8" y="12" width="36" height="36" rx="8" fill="url(#ipvGreen)"/>
  <text x="26" y="40" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="900" fill="white" letter-spacing="-1">IP</text>
  <!-- Wordmark -->
  <text x="54" y="40" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" letter-spacing="-0.8">
    <tspan fill="#0f172a">IP</tspan><tspan fill="#6AB04C">Vanish</tspan>
  </text>
</svg>
