<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60" role="img" aria-label="Surfshark">
  <title>Surfshark</title>
  <desc>Surfshark logo representation for BuySecureVPN review. Brand colors: #1EBFBF.</desc>
  <defs>
    <linearGradient id="sharkTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2FD4D4"/>
      <stop offset="100%" stop-color="#0E9898"/>
    </linearGradient>
  </defs>
  <!-- Brand mark: rounded square with stylized shark fin -->
  <rect x="8" y="12" width="36" height="36" rx="10" fill="url(#sharkTeal)"/>
  <!-- Shark-fin-inspired mark in white -->
