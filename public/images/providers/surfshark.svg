  <circle cx="29" cy="24" r="2" fill="white" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="54" y="40" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" letter-spacing="-0.8">
    <tspan fill="#0f172a">Surf</tspan><tspan fill="#1EBFBF">shark</tspan>
